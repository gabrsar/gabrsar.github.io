<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Currículo - Gabriel Saraiva</title>
    <meta name="description" content="Currículo em PDF de Gabriel Saraiva.">
    <style>
      :root {
        --ink: #151719;
        --muted: #6b7178;
        --paper: #f6f1e8;
        --white: #fffdf7;
        --night: #080b0e;
        --line: rgba(21, 23, 25, 0.14);
        --teal: #1f6f68;
        --gold: #e3b15b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(8, 11, 14, 0.98) 0 320px, transparent 320px),
          var(--paper);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body.resume-fullscreen {
        overflow: hidden;
        background: #dcd8cf;
      }

      a {
        color: inherit;
      }

      .shell {
        width: min(1120px, calc(100% - 40px));
        margin: 0 auto;
        padding-bottom: 48px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 64px;
        color: var(--white);
      }

      .topbar a {
        color: rgba(255, 255, 255, 0.78);
        font-weight: 760;
        text-decoration: none;
      }

      .topbar a:hover,
      .topbar a:focus {
        color: var(--white);
      }

      .nav-links {
        display: flex;
        gap: 18px;
        font-size: 0.92rem;
      }

      header {
        max-width: 780px;
        padding: 36px 0 24px;
        color: var(--white);
      }

      .eyebrow {
        margin: 0 0 14px;
        color: var(--gold);
        font-size: 0.78rem;
        font-weight: 820;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(2rem, 4vw, 3.2rem);
        line-height: 1;
        letter-spacing: 0;
      }

      header p {
        margin: 0;
        color: rgba(255, 255, 255, 0.76);
        font-size: 1.08rem;
        line-height: 1.58;
      }

      .viewer {
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: #e8e3d8;
        box-shadow: 0 24px 80px rgba(21, 23, 25, 0.22);
      }

      body.resume-fullscreen .shell {
        width: 100%;
        height: 100vh;
        padding: 0;
      }

      body.resume-fullscreen .topbar,
      body.resume-fullscreen header {
        display: none;
      }

      body.resume-fullscreen .viewer {
        display: grid;
        grid-template-rows: auto 1fr;
        width: 100%;
        height: 100vh;
        border: 0;
        border-radius: 0;
        box-shadow: none;
      }

      .viewer-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        border-bottom: 1px solid var(--line);
        padding: 14px;
        background: rgba(255, 253, 247, 0.8);
        backdrop-filter: blur(14px);
      }

      body.resume-fullscreen .viewer-toolbar {
        position: fixed;
        top: 14px;
        left: 50%;
        z-index: 6;
        width: min(760px, calc(100% - 28px));
        border: 1px solid rgba(21, 23, 25, 0.12);
        border-radius: 8px;
        box-shadow: 0 14px 38px rgba(21, 23, 25, 0.18);
        transform: translateX(-50%);
      }

      .viewer-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .viewer-link,
      .viewer button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        border: 1px solid rgba(21, 23, 25, 0.14);
        border-radius: 6px;
        padding: 8px 12px;
        background: var(--night);
        color: var(--white);
        font: inherit;
        font-size: 0.92rem;
        font-weight: 760;
        text-decoration: none;
      }

      .viewer button {
        cursor: pointer;
      }

      .viewer button:hover,
      .viewer button:focus,
      .viewer-link:hover,
      .viewer-link:focus {
        background: #1a1f24;
      }

      .status {
        color: var(--muted);
        font-size: 0.94rem;
        font-weight: 760;
      }

      .document-stage {
        position: relative;
        min-height: 76vh;
        overflow: auto;
        padding: 34px;
        background:
          linear-gradient(90deg, rgba(21, 23, 25, 0.04), transparent 12%, transparent 88%, rgba(21, 23, 25, 0.04)),
          #e8e3d8;
      }

      body.resume-fullscreen .document-stage {
        min-height: 100vh;
        padding: 92px 34px 34px;
      }

      .pages {
        display: grid;
        justify-items: center;
        gap: 28px;
      }

      .pdf-page {
        width: min(100%, 8.5in);
        border-radius: 4px;
        background: var(--white);
        box-shadow:
          0 38px 98px rgba(21, 23, 25, 0.3),
          0 12px 28px rgba(21, 23, 25, 0.16),
          0 2px 6px rgba(21, 23, 25, 0.1);
        overflow: hidden;
      }

      body.resume-fullscreen .pdf-page {
        width: min(calc((100vh - 150px) * 8.5 / 11), calc(100vw - 72px), 8.5in);
      }

      .pdf-page canvas {
        display: block;
        width: 100%;
        height: auto;
      }

      .loading,
      .fallback {
        display: grid;
        min-height: 60vh;
        place-items: center;
        color: var(--muted);
        text-align: center;
      }

      .fallback {
        gap: 16px;
        padding: 28px;
      }

      .fallback object {
        width: min(100%, 8.5in);
        height: 78vh;
        border: 0;
        background: var(--white);
      }

      @media (max-width: 760px) {
        .shell {
          width: min(100% - 28px, 1120px);
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
          justify-content: center;
          gap: 8px;
          padding: 14px 0;
        }

        header {
          padding-top: 48px;
        }

        .viewer-toolbar {
          align-items: stretch;
          flex-direction: column;
        }

        .viewer-actions {
          justify-content: stretch;
        }

        .viewer-link,
        .viewer button {
          flex: 1 1 auto;
        }

        .document-stage {
          padding: 16px;
        }

        body.resume-fullscreen .document-stage {
          padding: 104px 12px 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <nav class="topbar" aria-label="Navegação">
        <a href="../index.html">← Voltar</a>
        <div class="nav-links">
          <a href="../index.html">Início</a>
          <a href="../projects/index.html">Projetos</a>
          <a href="https://github.com/gabrsar">GitHub</a>
          <a href="https://br.linkedin.com/in/gabrielsaraiva7">LinkedIn</a>
        </div>
      </nav>

      <header>
        <p class="eyebrow">Currículo</p>
        <h1>Um pouco do que eu já fiz</h1>
        <p>
          Por algum motivo, algumas pessoas e empresas preferem uma versão em PDF do meu currículo.
        </p>
      </header>

      <section class="viewer" aria-label="Visualizador do currículo em PDF">
        <div class="viewer-toolbar">
          <div class="viewer-actions">
            <a class="viewer-link" href="./Gabriel-Saraiva-Staff-Software-Engineer-Resume.pdf" download>Download</a>
            <button id="fullscreen-toggle" type="button" aria-pressed="false">Tela cheia</button>
          </div>
          <div class="status" id="status">Carregando PDF...</div>
        </div>
        <div class="document-stage" id="document-stage">
          <div class="pages" id="pages">
            <div class="loading">Preparando o currículo...</div>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      const pdfUrl = "./Gabriel-Saraiva-Staff-Software-Engineer-Resume.pdf";
      const viewer = document.querySelector(".viewer");
      const pages = document.querySelector("#pages");
      const status = document.querySelector("#status");
      const fullscreenButton = document.querySelector("#fullscreen-toggle");
      const stage = document.querySelector("#document-stage");

      let pdfDocument = null;
      let fallbackFullscreen = false;

      function isFullscreen() {
        return Boolean(document.fullscreenElement) || fallbackFullscreen;
      }

      function syncFullscreenState() {
        const active = isFullscreen();
        document.body.classList.toggle("resume-fullscreen", active);
        fullscreenButton.textContent = active ? "Sair da tela cheia" : "Tela cheia";
        fullscreenButton.setAttribute("aria-pressed", String(active));
      }

      async function toggleFullscreen() {
        if (isFullscreen()) {
          fallbackFullscreen = false;
          if (document.fullscreenElement && document.exitFullscreen) {
            await document.exitFullscreen();
          } else {
            syncFullscreenState();
          }
          return;
        }

        try {
          if (viewer.requestFullscreen) {
            await viewer.requestFullscreen();
          } else {
            fallbackFullscreen = true;
            syncFullscreenState();
          }
        } catch (error) {
          fallbackFullscreen = true;
          syncFullscreenState();
        }
      }

      function showFallback() {
        pages.innerHTML = `
          <div class="fallback">
            <p>O visualizador animado não carregou, mas o PDF ainda está disponível aqui.</p>
            <object data="${pdfUrl}" type="application/pdf">
              <a href="${pdfUrl}">Abrir currículo em PDF</a>
            </object>
          </div>
        `;
        status.textContent = "Visualização alternativa";
      }

      function targetWidth() {
        const available = Math.max(320, Math.min(stage.clientWidth - 68, 816));
        return available;
      }

      async function renderPage(pageNumber) {
        const page = await pdfDocument.getPage(pageNumber);
        const viewport = page.getViewport({ scale: 1 });
        const scale = targetWidth() / viewport.width;
        const scaledViewport = page.getViewport({ scale });
        const pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
        const pageElement = document.createElement("article");
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");

        pageElement.className = "pdf-page";
        pageElement.setAttribute("aria-label", `Página ${pageNumber}`);
        canvas.width = Math.floor(scaledViewport.width * pixelRatio);
        canvas.height = Math.floor(scaledViewport.height * pixelRatio);
        context.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);

        pageElement.appendChild(canvas);
        await page.render({ canvasContext: context, viewport: scaledViewport }).promise;
        return pageElement;
      }

      async function renderDocument() {
        pages.innerHTML = "";
        const fragment = document.createDocumentFragment();

        for (let pageNumber = 1; pageNumber <= pdfDocument.numPages; pageNumber += 1) {
          status.textContent = `Renderizando página ${pageNumber} de ${pdfDocument.numPages}`;
          fragment.appendChild(await renderPage(pageNumber));
        }

        pages.appendChild(fragment);
        status.textContent = `${pdfDocument.numPages} ${pdfDocument.numPages === 1 ? "página" : "páginas"}`;
      }

      fullscreenButton.addEventListener("click", () => {
        toggleFullscreen();
      });

      document.addEventListener("fullscreenchange", () => {
        fallbackFullscreen = false;
        syncFullscreenState();
      });

      async function boot() {
        try {
          if (!window.pdfjsLib) {
            showFallback();
            return;
          }

          pdfjsLib.GlobalWorkerOptions.workerSrc =
            "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
          pdfDocument = await pdfjsLib.getDocument(pdfUrl).promise;
          await renderDocument();
        } catch (error) {
          console.error("Unable to render PDF", error);
          showFallback();
        }
      }

      boot();
    </script>
  </body>
</html>
